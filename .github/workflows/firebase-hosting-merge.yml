name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
      - name: Validate Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOJA_MULTIMARCAS }}
        run: |
          set -euo pipefail
          if [[ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_LOJA_MULTIMARCAS não está definido."
            exit 1
          fi

          node -e "const raw=process.env.FIREBASE_SERVICE_ACCOUNT;let json;try{json=JSON.parse(raw)}catch{console.error('::error::O secret FIREBASE_SERVICE_ACCOUNT_LOJA_MULTIMARCAS não é JSON válido de Service Account.');process.exit(1)};const required=['type','project_id','private_key','client_email'];const missing=required.filter((k)=>!json[k]);if(missing.length){console.error('::error::JSON da Service Account incompleto. Campos ausentes: '+missing.join(', '));process.exit(1)};if(json.type!=='service_account'){console.error('::error::O JSON informado não é do tipo service_account.');process.exit(1)}"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOJA_MULTIMARCAS }}
          channelId: live
          projectId: loja-multimarcas
